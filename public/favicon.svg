<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#13151a"/>

  <!-- Container stack (3 rows of 3 blocks) -->
  <!-- Row 3 (bottom) -->
  <rect x="4"  y="20" width="6" height="5" rx="1" fill="#f5a623"/>
  <rect x="12" y="20" width="6" height="5" rx="1" fill="#f5a623"/>
  <rect x="20" y="20" width="6" height="5" rx="1" fill="#f5a623"/>

  <!-- Row 2 (middle) -->
  <rect x="4"  y="13" width="6" height="5" rx="1" fill="#c47d10"/>
  <rect x="12" y="13" width="6" height="5" rx="1" fill="#f5a623"/>
  <rect x="20" y="13" width="6" height="5" rx="1" fill="#c47d10"/>

  <!-- Row 1 (top, partial — only center) -->
  <rect x="12" y="6"  width="6" height="5" rx="1" fill="#c47d10"/>

  <!-- Whale tail hint — small curved line at right -->
  <path d="M26 10 Q30 8 29 13" stroke="#f5a623" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
